name: Build and Push Docker Images

on:
  push:
    branches: ['main']
    tags: ['v*']
  pull_request:
    branches: ['main']
    types: [closed]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/frontend
  PROVISIONER_IMAGE_NAME: ${{ github.repository }}/provisioner

concurrency:
  group: docker-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create frontend .env file for build
        run: |
          echo "BETTER_AUTH_SECRET=github-actions-build-secret" > frontend/.env
          cat frontend/.env

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=long
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=long
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Extract metadata for Provisioner
        id: meta-provisioner
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROVISIONER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=long
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1

      - name: Build and push Provisioner image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/provisioner
          file: docker/provisioner/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-provisioner.outputs.tags }}
          labels: ${{ steps.meta-provisioner.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: |
          echo "Backend image: ${{ steps.meta-backend.outputs.tags }}"
          echo "Frontend image: ${{ steps.meta-frontend.outputs.tags }}"
          echo "Provisioner image: ${{ steps.meta-provisioner.outputs.tags }}"

      - name: Set package visibility to public
        if: github.event_name != 'pull_request'
        run: |
          # Extract package names from image names
          BACKEND_PKG=$(echo "${{ env.BACKEND_IMAGE_NAME }}" | cut -d'/' -f2)
          FRONTEND_PKG=$(echo "${{ env.FRONTEND_IMAGE_NAME }}" | cut -d'/' -f2)
          PROVISIONER_PKG=$(echo "${{ env.PROVISIONER_IMAGE_NAME }}" | cut -d'/' -f2)

          # Set backend package to public
          echo "Setting $BACKEND_PKG to public..."
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/packages/container/$BACKEND_PKG \
            -d '{"visibility":"public"}' || echo "Failed to set backend package visibility"

          # Set frontend package to public
          echo "Setting $FRONTEND_PKG to public..."
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/packages/container/$FRONTEND_PKG \
            -d '{"visibility":"public"}' || echo "Failed to set frontend package visibility"

          # Set provisioner package to public
          echo "Setting $PROVISIONER_PKG to public..."
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/packages/container/$PROVISIONER_PKG \
            -d '{"visibility":"public"}' || echo "Failed to set provisioner package visibility"

          echo "All packages set to public visibility"

  cleanup-untagged-images:
    needs: build-and-push
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        package: [backend, frontend, provisioner]
      fail-fast: false
    steps:
      - name: Delete old untagged images
        uses: actions/github-script@v7
        env:
          PACKAGE_NAME: ${{ matrix.package }}
          KEEP_COUNT: 15
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const packageName = process.env.PACKAGE_NAME;
            const keepCount = parseInt(process.env.KEEP_COUNT, 10);

            console.log(`Cleaning up ${packageName} images, keeping latest ${keepCount} untagged versions`);

            let allVersions = [];
            try {
              let page = 1;
              const perPage = 100;

              while (true) {
                const response = await github.request(`GET /user/packages/container/${packageName}/versions`, {
                  per_page: perPage,
                  page: page,
                });

                const versions = response.data;
                if (versions.length === 0) break;
                allVersions.push(...versions);
                if (versions.length < perPage) break;
                page++;
              }
            } catch (err) {
              if (err.status === 404) {
                console.log(`Package '${packageName}' not found, skipping cleanup`);
                return;
              }
              throw err;
            }

            console.log(`Found ${allVersions.length} total versions`);

            const untaggedVersions = allVersions.filter(v => {
              const tags = v.metadata?.container?.tags || [];
              return tags.length === 0 || tags.every(t => !t.startsWith('v'));
            });

            console.log(`Found ${untaggedVersions.length} untagged versions`);

            untaggedVersions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = untaggedVersions.slice(keepCount);
            console.log(`Will delete ${toDelete.length} old untagged versions`);

            for (const version of toDelete) {
              try {
                await github.request(`DELETE /user/packages/container/${packageName}/versions/${version.id}`);
                console.log(`Deleted version ${version.id} (created: ${version.created_at})`);
              } catch (err) {
                console.error(`Failed to delete version ${version.id}: ${err.message}`);
              }
            }

            if (toDelete.length === 0) {
              console.log('No versions to delete');
            } else {
              console.log(`Successfully deleted ${toDelete.length} old untagged versions`);
            }
